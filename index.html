<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --accent-color: #58a6ff;
            --accent-hover: #1f6feb;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
        }
        .repo-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .repo-link:hover {
            color: var(--accent-color);
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }
        @media (min-width: 600px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1.25rem;
            transition: transform 0.2s, border-color 0.2s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-color);
        }
        .card h2 {
            font-size: 1.1rem;
            color: var(--accent-color);
            margin: 0 0 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .card p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 0;
            flex-grow: 1;
        }
        footer {
            margin-top: 3rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>My ThreeJS Projects</h1>
            <a href="https://github.com/kaitlyn-gaston/threejs/" class="repo-link" target="_blank">
                📁 View Source on GitHub →
            </a>
        </header>

        <main class="grid">
            
            <a href="striped-noise-shader/dist/" class="card">
                <h2>📁 Striped Noise Shader</h2>
            </a>

            <a href="14-lights/dist/" class="card">
                <h2>📁 Lesson 14: Lights</h2>
            </a>

            <a href="11-materials/dist/" class="card">
                <h2>📁 Lesson 11: Materials</h2>
            </a>

            <a href="12-3d-text/dist/" class="card">
                <h2>📁 Lesson 12: 3D Text</h2>
            </a>

        </main>

        <footer>
            <p>Hosted via GitHub Pages</p>
        </footer>
    </div>

</body>
</html>
